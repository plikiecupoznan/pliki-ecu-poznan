<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pliki ECU Poznań — Wkrótce</title>
  <meta name="description" content="Mobilny serwis plików ECU w Poznaniu i Wielkopolsce. DPF OFF, EGR OFF, AdBlue OFF, Remapping.Wkrótce nowa strona!">
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #ff4500;
      --bg-dark: #0a0a0a;
      --bg-card: #141414;
      --border: #2a2a2a;
      --text: #f5f5f5;
      --text-secondary: #999;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }
    .logo {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 60px;
      color: var(--text);
    }
    .logo span { color: var(--accent); }
    .badge {
      display: inline-block;
      background: rgba(255, 69, 0, 0.1);
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 8px 20px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 32px;
    }
    h1 {
      font-size: clamp(32px, 6vw, 56px);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 24px;
    }
    h1 span { color: var(--accent); }
    .subtitle {
      font-size: 18px;
      color: var(--text-secondary);
      max-width: 500px;
      line-height: 1.6;
      margin-bottom: 48px;
    }
    .contact {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 48px;
      display: inline-block;
    }
    .contact-label {
      font-size: 13px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }
    .contact-phone {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .contact-phone:hover { opacity: 0.8; }
    .contact-city {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 8px;
    }
    .footer {
      position: fixed;
      bottom: 20px;
      font-size: 13px;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="logo">Pliki<span>ECU</span></div>
  
  <div class="badge">Przerwa techniczna</div>
  
  <h1>Nowa strona<br><span>już wkrótce!</span></h1>
  
  <p class="subtitle">
    Pracujemy nad ulepszoną wersją naszej strony. Niedługo wrócimy z lepszym designem i nowymi funkcjami.
  </p>
  
  <div class="contact">
    <div class="contact-label">Masz pytania?</div>
    <a href="tel:48452555922" class="contact-phone">452 555 922</a>
    <div class="contact-city">Poznań • Wielkopolska</div>
  </div>
  
  <div class="footer">
    © 2026 PlikiECU Poznań — Mobilny serwis ECU
  </div>
</body>
</html>
